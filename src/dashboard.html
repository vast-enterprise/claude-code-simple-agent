<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Avatar Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

  <!-- 顶部标题栏 -->
  <header class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex items-center justify-between">
    <h1 class="text-xl font-bold tracking-tight">Digital Avatar Dashboard</h1>
    <div class="flex items-center gap-3 text-sm text-gray-400">
      <span id="refresh-indicator" class="hidden">
        <svg class="w-4 h-4 spin inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
      </span>
      <span id="last-update">--</span>
      <button onclick="refreshAll()" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-gray-300 transition-colors">
        刷新
      </button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 space-y-6">

    <!-- 状态卡片区 -->
    <section id="status-cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
      <!-- Uptime -->
      <div class="bg-gray-800 rounded-lg shadow-lg p-5 border-l-4 border-green-500">
        <div class="text-sm text-gray-400 mb-1">Uptime</div>
        <div id="card-uptime" class="text-2xl font-bold text-green-400">--</div>
      </div>
      <!-- 总消息数 -->
      <div class="bg-gray-800 rounded-lg shadow-lg p-5 border-l-4 border-blue-500">
        <div class="text-sm text-gray-400 mb-1">总消息数</div>
        <div id="card-messages" class="text-2xl font-bold text-blue-400">--</div>
      </div>
      <!-- 错误数 -->
      <div class="bg-gray-800 rounded-lg shadow-lg p-5 border-l-4" id="card-errors-container">
        <div class="text-sm text-gray-400 mb-1">错误数</div>
        <div class="flex items-baseline gap-2">
          <span id="card-errors" class="text-2xl font-bold">--</span>
          <span id="card-error-rate" class="text-sm text-gray-500">--</span>
        </div>
      </div>
      <!-- 活跃 Session -->
      <div class="bg-gray-800 rounded-lg shadow-lg p-5 border-l-4 border-purple-500">
        <div class="text-sm text-gray-400 mb-1">活跃 Session</div>
        <div id="card-sessions" class="text-2xl font-bold text-purple-400">--</div>
      </div>
    </section>

    <!-- Session 列表 -->
    <section>
      <h2 class="text-lg font-semibold mb-3">Session 列表</h2>
      <div class="bg-gray-800 rounded-lg shadow-lg overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-750 text-gray-400 text-left">
              <th class="px-4 py-3 bg-gray-700/50">Session ID</th>
              <th class="px-4 py-3 bg-gray-700/50">创建时间</th>
              <th class="px-4 py-3 bg-gray-700/50">最后活跃</th>
              <th class="px-4 py-3 bg-gray-700/50 text-right">消息数</th>
              <th class="px-4 py-3 bg-gray-700/50 text-center">操作</th>
            </tr>
          </thead>
          <tbody id="session-tbody">
            <tr>
              <td colspan="5" class="px-4 py-8 text-center text-gray-500">加载中...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- 消息时间线模态面板 -->
  <div id="timeline-overlay" class="hidden fixed inset-0 bg-black/60 z-40" onclick="closeTimeline()"></div>
  <div id="timeline-panel" class="hidden fixed top-0 right-0 h-full w-full max-w-2xl bg-gray-800 border-l border-gray-700 z-50 flex flex-col shadow-2xl">
    <div class="flex items-center justify-between px-5 py-4 border-b border-gray-700">
      <h3 class="font-semibold text-base">
        消息时间线 — <span id="timeline-session-id" class="text-purple-400 font-mono text-sm"></span>
      </h3>
      <button onclick="closeTimeline()" class="text-gray-400 hover:text-white transition-colors text-xl leading-none">&times;</button>
    </div>
    <div id="timeline-content" class="flex-1 overflow-y-auto p-5 space-y-3">
      <p class="text-gray-500 text-center py-8">加载中...</p>
    </div>
  </div>

<script>
// ── 工具函数 ──────────────────────────────────────────

function relativeTime(isoString) {
  if (!isoString) return '--';
  const now = Date.now();
  const then = new Date(isoString).getTime();
  const diff = Math.max(0, now - then);
  const seconds = Math.floor(diff / 1000);
  if (seconds < 60) return '刚刚';
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return minutes + ' 分钟前';
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return hours + ' 小时前';
  const days = Math.floor(hours / 24);
  if (days < 30) return days + ' 天前';
  return new Date(isoString).toLocaleDateString('zh-CN');
}

function localTime(isoString) {
  if (!isoString) return '--';
  return new Date(isoString).toLocaleString('zh-CN', {
    month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// ── 状态卡片 ──────────────────────────────────────────

async function fetchStatus() {
  try {
    const res = await fetch('/api/status');
    if (!res.ok) throw new Error('status ' + res.status);
    const data = await res.json();
    document.getElementById('card-uptime').textContent = data.uptime || '--';
    document.getElementById('card-messages').textContent = data.total_messages ?? '--';

    const errors = data.total_errors ?? 0;
    document.getElementById('card-errors').textContent = errors;
    document.getElementById('card-error-rate').textContent = data.error_rate ? '(' + data.error_rate + ')' : '';

    const container = document.getElementById('card-errors-container');
    if (errors > 0) {
      container.classList.remove('border-gray-500');
      container.classList.add('border-red-500');
      document.getElementById('card-errors').classList.remove('text-gray-400');
      document.getElementById('card-errors').classList.add('text-red-400');
    } else {
      container.classList.remove('border-red-500');
      container.classList.add('border-gray-500');
      document.getElementById('card-errors').classList.remove('text-red-400');
      document.getElementById('card-errors').classList.add('text-gray-400');
    }

    document.getElementById('card-sessions').textContent = data.active_sessions ?? '--';
  } catch (err) {
    console.error('Failed to fetch status:', err);
  }
}

// ── Session 列表 ──────────────────────────────────────

let sessionsData = {};

async function fetchSessions() {
  try {
    const res = await fetch('/api/sessions');
    if (!res.ok) throw new Error('status ' + res.status);
    sessionsData = await res.json();
    renderSessions();
  } catch (err) {
    console.error('Failed to fetch sessions:', err);
    document.getElementById('session-tbody').innerHTML =
      '<tr><td colspan="5" class="px-4 py-8 text-center text-red-400">获取 Session 失败</td></tr>';
  }
}

function renderSessions() {
  const tbody = document.getElementById('session-tbody');
  const entries = Object.entries(sessionsData);

  if (entries.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-gray-500">暂无活跃 Session</td></tr>';
    return;
  }

  // 按最后活跃时间降序
  entries.sort(function(a, b) {
    return new Date(b[1].last_active || 0) - new Date(a[1].last_active || 0);
  });

  tbody.innerHTML = entries.map(function(entry, idx) {
    var id = entry[0];
    var s = entry[1];
    var rowBg = idx % 2 === 0 ? 'bg-gray-800' : 'bg-gray-800/60';
    return '<tr class="' + rowBg + ' hover:bg-gray-700/50 transition-colors">' +
      '<td class="px-4 py-3">' +
        '<button onclick="openTimeline(\'' + escapeHtml(id) + '\')" ' +
          'class="text-purple-400 hover:text-purple-300 hover:underline font-mono text-xs transition-colors">' +
          escapeHtml(id) +
        '</button>' +
      '</td>' +
      '<td class="px-4 py-3 text-gray-400">' + localTime(s.created_at) + '</td>' +
      '<td class="px-4 py-3 text-gray-400" title="' + localTime(s.last_active) + '">' + relativeTime(s.last_active) + '</td>' +
      '<td class="px-4 py-3 text-right">' + (s.message_count ?? 0) + '</td>' +
      '<td class="px-4 py-3 text-center space-x-2">' +
        '<button onclick="clearSession(\'' + escapeHtml(id) + '\')" ' +
          'class="px-2 py-1 text-xs bg-red-600 hover:bg-red-500 rounded transition-colors">Clear</button>' +
        '<button disabled ' +
          'class="px-2 py-1 text-xs bg-yellow-600/50 text-yellow-300/50 rounded cursor-not-allowed" ' +
          'title="compact 功能开发中">Compact</button>' +
      '</td>' +
    '</tr>';
  }).join('');
}

// ── Clear Session ────────────────────────────────────

async function clearSession(sessionId) {
  if (!confirm('确认清除 Session "' + sessionId + '" 的消息历史？此操作不可撤销。')) return;
  try {
    var res = await fetch('/api/sessions/' + encodeURIComponent(sessionId) + '/clear', { method: 'POST' });
    if (!res.ok) throw new Error('status ' + res.status);
    var data = await res.json();
    if (data.ok) {
      await fetchSessions();
    } else {
      alert('清除失败：' + (data.message || '未知错误'));
    }
  } catch (err) {
    alert('请求失败：' + err.message);
  }
}

// ── 消息时间线 ────────────────────────────────────────

async function openTimeline(sessionId) {
  document.getElementById('timeline-session-id').textContent = sessionId;
  document.getElementById('timeline-content').innerHTML = '<p class="text-gray-500 text-center py-8">加载中...</p>';
  document.getElementById('timeline-overlay').classList.remove('hidden');
  document.getElementById('timeline-panel').classList.remove('hidden');
  document.body.style.overflow = 'hidden';

  try {
    var res = await fetch('/api/sessions/' + encodeURIComponent(sessionId) + '/messages');
    if (!res.ok) throw new Error('status ' + res.status);
    var messages = await res.json();
    renderTimeline(messages);
  } catch (err) {
    document.getElementById('timeline-content').innerHTML =
      '<p class="text-red-400 text-center py-8">加载失败：' + escapeHtml(err.message) + '</p>';
  }
}

function renderTimeline(messages) {
  var container = document.getElementById('timeline-content');
  if (!messages || messages.length === 0) {
    container.innerHTML = '<p class="text-gray-500 text-center py-8">暂无消息记录</p>';
    return;
  }

  container.innerHTML = messages.map(function(msg) {
    var isError = !msg.success;
    var borderColor = isError ? 'border-red-500' : 'border-gray-600';
    var bgColor = isError ? 'bg-red-900/20' : 'bg-gray-700/30';
    var statusBadge = isError
      ? '<span class="px-2 py-0.5 text-xs rounded bg-red-600/30 text-red-400">失败</span>'
      : '<span class="px-2 py-0.5 text-xs rounded bg-green-600/30 text-green-400">成功</span>';

    return '<div class="' + bgColor + ' border-l-2 ' + borderColor + ' rounded-r-lg p-4 fade-in">' +
      '<div class="flex items-center justify-between mb-2">' +
        '<span class="text-xs text-gray-400" title="' + localTime(msg.timestamp) + '">' + relativeTime(msg.timestamp) + '</span>' +
        statusBadge +
      '</div>' +
      '<div class="mb-1">' +
        '<span class="text-xs text-gray-500">用户：</span>' +
        '<span class="text-sm text-gray-200">' + escapeHtml(msg.content_preview) + '</span>' +
      '</div>' +
      (msg.reply_preview
        ? '<div>' +
            '<span class="text-xs text-gray-500">回复：</span>' +
            '<span class="text-sm text-gray-300">' + escapeHtml(msg.reply_preview) + '</span>' +
          '</div>'
        : '') +
    '</div>';
  }).join('');
}

function closeTimeline() {
  document.getElementById('timeline-overlay').classList.add('hidden');
  document.getElementById('timeline-panel').classList.add('hidden');
  document.body.style.overflow = '';
}

// ESC 关闭时间线面板
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeTimeline();
});

// ── 轮询与刷新 ────────────────────────────────────────

async function refreshAll() {
  var indicator = document.getElementById('refresh-indicator');
  indicator.classList.remove('hidden');
  await Promise.all([fetchStatus(), fetchSessions()]);
  indicator.classList.add('hidden');
  document.getElementById('last-update').textContent = '更新于 ' + new Date().toLocaleTimeString('zh-CN');
}

// 初始加载
refreshAll();

// 30 秒轮询
setInterval(refreshAll, 30000);

</script>
</body>
</html>
